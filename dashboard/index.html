<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>榴莲庄经营追踪 Durian Farm Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2e7d32" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="vendor/chart.umd.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🌰</span>
      <div>
        <div class="brand-title" id="farmName">我的榴莲庄</div>
        <div class="brand-sub">经营追踪系统 Durian Farm Tracker</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn small" id="btnConnect">📂 连接数据文件 (给 AI 读)</button>
      <button class="btn small ghost" id="btnExcel">⬇ 导出 Excel</button>
      <button class="btn small ghost" id="btnExportJSON">导出 JSON</button>
      <button class="btn small ghost" id="btnImportJSON">导入 JSON</button>
    </div>
  </header>

  <div class="filestatus" id="fileStatus">数据存在本浏览器。点「连接数据文件」选 data/farm-data.json，AI 团队即可读到你的最新数据。</div>
  <div class="filestatus" id="syncStatus">☁️ 云端同步：未登录</div>

  <div class="layout">
    <nav class="sidebar">
      <a class="nav-item" data-view="overview" href="#overview">📊 总览 Overview</a>
      <a class="nav-item" data-view="batches" href="#batches">🌳 采收批次 Batches</a>
      <a class="nav-item" data-view="costs" href="#costs">💵 成本 Costs</a>
      <a class="nav-item" data-view="wholesale" href="#wholesale">🚚 批发与损耗 Wholesale & Loss</a>
      <a class="nav-item" data-view="grades" href="#grades">🏅 等级与定价 Grades & Pricing</a>
      <a class="nav-item" data-view="merchants" href="#merchants">🧾 应收/客户 AR & Merchants</a>
    </nav>
    <main id="view" class="content"><!-- 渲染区 --></main>
  </div>

  <div id="modal" class="modal"></div>

  <div id="loginGate" class="modal show">
    <div class="modal-card" style="max-width:360px;">
      <h3>🔒 登录 Login</h3>
      <p class="muted">用你的邮箱密码登录，数据云端同步。</p>
      <form id="loginForm" class="form">
        <div class="fld"><span>邮箱 Email</span><input type="email" id="loginEmail" required /></div>
        <div class="fld"><span>密码 Password</span><input type="password" id="loginPassword" required /></div>
        <div id="loginError" class="hint warn-text"></div>
        <div class="modal-actions"><button type="submit" class="btn">登录 Login</button></div>
      </form>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module" src="firebase-init.js"></script>
  <script src="app.js"></script>
</body>
</html>
